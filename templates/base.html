<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Vector Lab{% endblock %} · Generative AI &amp; LLM Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="scanline" aria-hidden="true"></div>

<header class="topbar">
  <a class="brand" href="{{ url_for('index') }}">
    <span class="brand-mark">VECTOR</span><span class="brand-mark brand-mark--dim">//LAB</span>
  </a>
  <nav class="topnav">
    <a href="{{ url_for('index') }}" class="{{ 'is-active' if request.path == '/' else '' }}">Overview</a>
    <a href="{{ url_for('embeddings_page') }}" class="{{ 'is-active' if request.path == '/embeddings' else '' }}">Embedding Explorer</a>
    <a href="{{ url_for('translate_page') }}" class="{{ 'is-active' if request.path == '/translate' else '' }}">Translator</a>
    <a href="https://github.com" target="_blank" rel="noopener" class="topnav-github">Source ↗</a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="sitefoot">
  <div class="sitefoot-inner">
    <span>Generative AI &amp; LLM Toolkit — CBOW · Skip-gram · Seq2Seq built in PyTorch</span>
    <span class="sitefoot-dim">Trained live in this session, no external API calls.</span>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
